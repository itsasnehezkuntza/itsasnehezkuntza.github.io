<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taupada Akademia | Panela</title>
  <link rel="stylesheet" href="../assets/css/intro.css" />
  <style>
    body { min-height: 100vh; color: white; background: radial-gradient(circle at 75% 10%, rgba(229,139,119,.22), transparent 30%), linear-gradient(135deg, #101735, #1E254F); display: grid; place-items: center; padding: 28px; }
    .panel-placeholder { width: min(860px, 100%); padding: clamp(24px, 5vw, 46px); border-radius: 30px; background: rgba(252,251,247,.95); color: var(--stage-navy); border: 1px solid rgba(216,206,232,.95); box-shadow: 0 34px 90px rgba(0,0,0,.34); }
    .panel-placeholder h1 { color: var(--stage-navy); text-shadow: none; font-size: clamp(2.2rem, 6vw, 4.5rem); }
    .panel-placeholder p { color: var(--graphite); text-shadow: none; }
    .panel-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    .small-note { margin-top: 18px; color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>
  <main class="panel-placeholder">
    <div class="label">Taupada Akademia</div>
    <h1>Panela prestatzeko orria</h1>
    <p>Lehen orriko <strong>ONARTU</strong> botoia ondo dabil. Hurrengo pausoa hemen benetako misioen panela eraikitzea da: asteak, candadoak, aurrerapena eta koreografiaren zatiak.</p>
    <div class="panel-actions">
      <a class="btn btn-primary" href="../index.html" style="text-decoration:none;display:inline-flex;align-items:center;">Sarrerara itzuli</a>
    </div>
    <p class="small-note">Fitxategi hau ordezkatu ahal izango dugu gero panel osoarekin.</p>
  </main>
</body>
</html>
