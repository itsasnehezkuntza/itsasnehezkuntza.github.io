<!DOCTYPE html>
<html lang="eu">
<head>

      border-radius: 32px;
      background: rgba(252, 251, 247, 0.95);
      color: var(--stage-navy);
      border: 1px solid rgba(216, 206, 232, 0.95);
      box-shadow: 0 34px 90px rgba(0, 0, 0, 0.34);
    }
    .mission-placeholder h1 {
      margin: 0 0 16px 0;
      color: var(--stage-navy);
      font-size: clamp(2.4rem, 7vw, 5rem);
      line-height: 0.9;
      letter-spacing: -0.07em;

    .mission-placeholder p {
      margin: 0;

    }
    .mission-actions {
      display: flex;

      <div class="mission-actions">
